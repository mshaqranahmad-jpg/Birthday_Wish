<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jannan Special 🎀💖</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

.heart {
  position: fixed;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% {transform: translateY(0); opacity: 1;}
  100% {transform: translateY(-100vh); opacity: 0;}
}

.container {
  padding: 20px;
}

#text {
  white-space: pre-line;
  font-size: 18px;
}

.btn {
  padding: 12px 25px;
  margin: 10px;
  border: none;
  border-radius: 25px;
  font-size: 18px;
  cursor: pointer;
}

#yes { background: #00ff88; }
#no { background: red; color: white; position: absolute; }

.hidden { display: none; }
</style>
</head>

<body>

<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<div class="container">

<h1>🎂 Happy Birthday Jannan 🎀💖</h1>

<p id="text"></p>

<h2>Do you love me? 😳❤️</h2>

<button class="btn" id="yes" onclick="showLove()">YES 💖</button>
<button class="btn" id="no" onmouseover="moveNo()">NO 😜</button>

<h2 id="result" class="hidden">Aww ❤️ I Love You Too Jannan 🎀💖</h2>

</div>

<script>
let msg = `Happy Birthday MY JAAN ❤️
MY SPECIAL PERSON ❤️
You are my everything 💖
I LOVE YOU JANNAN 🎀❤️`;

let i = 0;
function typing() {
  if (i < msg.length) {
    document.getElementById("text").innerHTML += msg.charAt(i);
    i++;
    setTimeout(typing, 40);
  }
}
typing();

function showLove() {
  document.getElementById("result").classList.remove("hidden");
}

function moveNo() {
  let x = Math.random() * window.innerWidth - 100;
  let y = Math.random() * window.innerHeight - 50;

  let no = document.getElementById("no");
  no.style.left = x + "px";
  no.style.top = y + "px";
}

function hearts() {
  let h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "💖";
  h.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
}
setInterval(hearts, 300);
</script>

</body>
</html>
